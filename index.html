<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Minetest</title>
<style>
body{
margin:0;
overflow:hidden;
background:#87ceeb;
font-family:Arial;
touch-action:none;
user-select:none;
}

canvas{
display:block;
}

#menu{
position:fixed;
inset:0;
background:linear-gradient(#4caf50, #87ceeb);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
}

#logo{
font-size:70px;
color:white;
text-shadow:5px 5px #000, 10px 10px #333;
}

.btn{
width:320px;
height:65px;
margin:15px;
border:none;
background:#7b7b7b;
border-top:5px solid #bdbdbd;
border-left:5px solid #bdbdbd;
border-right:5px solid #3a3a3a;
border-bottom:5px solid #3a3a3a;
font-size:28px;
color:white;
cursor:pointer;
}

.btn:active{
border-top:5px solid #3a3a3a;
border-left:5px solid #3a3a3a;
border-right:5px solid #bdbdbd;
border-bottom:5px solid #bdbdbd;
}

#cross{
position:fixed;
left:50%;
top:50%;
transform:translate(-50%,-50%);
font-size:28px;
color:white;
z-index:50;
pointer-events:none;
}

#hotbar{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:8px;
z-index:100;
}

.slot{
width:70px;
height:70px;
background:rgba(0,0,0,.5);
border:4px solid #888;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
font-size:12px;
text-align:center;
cursor:pointer;
}

.slot.selected{
border:4px solid #ffff00;
background:rgba(255,255,0,.3);
}

.slot-count{
font-size:20px;
font-weight:bold;
}

.mobile-btn{
position:fixed;
width:80px;
height:80px;
background:rgba(255,255,255,.15);
border-radius:15px;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
color:white;
z-index:150;
cursor:pointer;
user-select:none;
border:3px solid rgba(255,255,255,.3);
touch-action:manipulation;
}

.mobile-btn:active{
background:rgba(255,255,255,.4);
transform:scale(0.95);
}

#forward{ left:50%; bottom:250px; transform:translateX(-50%); }
#left{ left:20px; bottom:150px; }
#right{ left:20px; bottom:60px; }
#back{ left:50%; bottom:60px; transform:translateX(-50%); }
#jump{ right:20px; bottom:150px; }

#mine-btn{
right:20px;
bottom:60px;
background:rgba(200,0,0,.3);
border:3px solid rgba(200,0,0,.6);
font-size:50px;
}

#mine-btn:active{
background:rgba(200,0,0,.6);
}

#place-btn{
right:110px;
bottom:60px;
background:rgba(0,150,0,.3);
border:3px solid rgba(0,150,0,.6);
font-size:50px;
}

#place-btn:active{
background:rgba(0,150,0,.6);
}

#info{
position:fixed;
top:20px;
left:20px;
color:white;
font-size:14px;
z-index:100;
background:rgba(0,0,0,.7);
padding:12px;
border-radius:5px;
line-height:1.8;
}

@media (max-width: 768px) {
#hotbar {
bottom:10px;
gap:5px;
}

.slot {
width:60px;
height:60px;
font-size:10px;
}

.slot-count {
font-size:16px;
}

#info {
font-size:12px;
padding:8px;
top:10px;
left:10px;
}

.mobile-btn {
width:70px;
height:70px;
font-size:35px;
border:2px solid rgba(255,255,255,.3);
}

#forward{ bottom:220px; }
#left{ left:15px; bottom:130px; }
#right{ left:15px; bottom:50px; }
#back{ bottom:50px; }
#jump{ right:15px; bottom:130px; }
#mine-btn{ right:15px; bottom:50px; }
#place-btn{ right:95px; bottom:50px; }
}

@media (max-width: 480px) {
.mobile-btn {
width:60px;
height:60px;
font-size:28px;
}

#forward{ bottom:180px; }
#left{ left:10px; bottom:110px; }
#right{ left:10px; bottom:40px; }
#back{ bottom:40px; }
#jump{ right:10px; bottom:110px; }
#mine-btn{ right:10px; bottom:40px; font-size:35px; }
#place-btn{ right:80px; bottom:40px; font-size:35px; }

#hotbar {
bottom:5px;
gap:3px;
}

.slot {
width:50px;
height:50px;
font-size:9px;
}

#info {
font-size:11px;
padding:6px;
top:5px;
left:5px;
}
}
</style>
</head>
<body>

<div id="menu">
<div id="logo">MINETEST</div>
<button class="btn" onclick="startGame()">Jogar</button>
</div>

<div id="info" style="display:none;">
<div>🖱️ Mouse: Olhar</div>
<div>⌨️ WASD: Mover | Espaço: Pular</div>
<div>1-4: Bloco</div>
</div>

<div id="cross" style="display:none;">+</div>

<div id="hotbar" style="display:none;">
<div class="slot selected" data-block="grass" onclick="selectBlock(0)">
<div>🟩</div>
<div class="slot-count">0</div>
</div>
<div class="slot" data-block="dirt" onclick="selectBlock(1)">
<div>🟫</div>
<div class="slot-count">0</div>
</div>
<div class="slot" data-block="wood" onclick="selectBlock(2)">
<div>🟧</div>
<div class="slot-count">0</div>
</div>
<div class="slot" data-block="stone" onclick="selectBlock(3)">
<div>⬜</div>
<div class="slot-count">0</div>
</div>
</div>

<!-- MOBILE CONTROLS -->
<div class="mobile-btn" id="forward" style="display:none;">▲</div>
<div class="mobile-btn" id="left" style="display:none;">◀</div>
<div class="mobile-btn" id="right" style="display:none;">▶</div>
<div class="mobile-btn" id="back" style="display:none;">▼</div>
<div class="mobile-btn" id="jump" style="display:none;">⬆️</div>
<div class="mobile-btn" id="mine-btn" style="display:none;">⛏️</div>
<div class="mobile-btn" id="place-btn" style="display:none;">🧱</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 200, 300);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.rotation.order = "YXZ";

const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(50, 100, 50);
light.castShadow = true;
light.shadow.mapSize.width = 2048;
light.shadow.mapSize.height = 2048;
scene.add(light);
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

function texture(base, dark, light) {
  const c = document.createElement("canvas");
  c.width = 16;
  c.height = 16;
  const g = c.getContext("2d");
  g.fillStyle = base;
  g.fillRect(0, 0, 16, 16);
  for(let i = 0; i < 40; i++) {
    g.fillStyle = Math.random() > 0.5 ? dark : light;
    g.fillRect(Math.random()*16, Math.random()*16, 2, 2);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.magFilter = THREE.NearestFilter;
  return tex;
}

const TEX = {
  grass: texture("#55aa55", "#448844", "#77cc77"),
  dirt: texture("#8b5a2b", "#6b3f16", "#a06a35"),
  wood: texture("#775533", "#553311", "#997755"),
  stone: texture("#888", "#666", "#aaa"),
  leaves: texture("#339933", "#227722", "#55bb55")
};

const blockMap = {};
const blocks = [];

function getBlockKey(x, y, z) {
  return `${Math.floor(x)},${Math.floor(y)},${Math.floor(z)}`;
}

function createBlock(x, y, z, tex, type = "stone") {
  const cube = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshLambertMaterial({map: tex}));
  cube.position.set(x, y, z);
  cube.castShadow = true;
  cube.receiveShadow = true;
  cube.userData.type = type;
  scene.add(cube);
  blocks.push(cube);
  blockMap[getBlockKey(x, y, z)] = cube;
  return cube;
}

function removeBlock(x, y, z) {
  const key = getBlockKey(x, y, z);
  const block = blockMap[key];
  if (block) {
    scene.remove(block);
    blocks.splice(blocks.indexOf(block), 1);
    delete blockMap[key];
    return block.userData.type;
  }
  return null;
}

function tree(x, y, z) {
  for(let i = 1; i <= 4; i++) {
    createBlock(x, y+i, z, TEX.wood, "wood");
  }
  for(let xx = -2; xx <= 2; xx++) {
    for(let zz = -2; zz <= 2; zz++) {
      for(let yy = 3; yy <= 5; yy++) {
        if(Math.random() > 0.2) {
          createBlock(x+xx, y+yy, z+zz, TEX.leaves, "leaves");
        }
      }
    }
  }
}

for(let x = -100; x < 100; x++) {
  for(let z = -100; z < 100; z++) {
    let h = Math.floor(Math.sin(x*0.2)*2 + Math.cos(z*0.2)*2);
    createBlock(x, h, z, TEX.grass, "grass");
    createBlock(x, h-1, z, TEX.dirt, "dirt");
    if(Math.random() < 0.02) {
      tree(x, h, z);
    }
  }
}

const player = { vy: 0, onGround: false };
camera.position.set(0, 10, 5);

const inventory = {
  grass: 0,
  dirt: 0,
  wood: 0,
  stone: 10,
  leaves: 0
};

let selectedBlock = "grass";

function selectBlock(index) {
  const blockTypes = ["grass", "dirt", "wood", "stone"];
  selectedBlock = blockTypes[index];
  document.querySelectorAll(".slot").forEach((s, i) => {
    s.classList.toggle("selected", i === index);
  });
}

function updateInventoryUI() {
  const slots = document.querySelectorAll(".slot");
  const types = ["grass", "dirt", "wood", "stone"];
  slots.forEach((slot, i) => {
    slot.querySelector(".slot-count").textContent = inventory[types[i]];
  });
}

const controls = { forward: false, back: false, left: false, right: false, jump: false };

function bindButton(id, key) {
  const el = document.getElementById(id);
  el.addEventListener("pointerdown", e => { e.preventDefault(); controls[key] = true; });
  el.addEventListener("pointerup", e => { e.preventDefault(); controls[key] = false; });
  el.addEventListener("pointerleave", () => { controls[key] = false; });
}

bindButton("forward", "forward");
bindButton("back", "back");
bindButton("left", "left");
bindButton("right", "right");
bindButton("jump", "jump");

document.getElementById("mine-btn").addEventListener("pointerdown", e => {
  e.preventDefault();
  handleBlockInteraction("break");
});

document.getElementById("place-btn").addEventListener("pointerdown", e => {
  e.preventDefault();
  handleBlockInteraction("place");
});

document.addEventListener("keydown", e => {
  if (e.key === "w") controls.forward = true;
  if (e.key === "s") controls.back = true;
  if (e.key === "a") controls.left = true;
  if (e.key === "d") controls.right = true;
  if (e.key === " ") { e.preventDefault(); controls.jump = true; }
  if (e.key >= "1" && e.key <= "4") selectBlock(parseInt(e.key) - 1);
});

document.addEventListener("keyup", e => {
  if (e.key === "w") controls.forward = false;
  if (e.key === "s") controls.back = false;
  if (e.key === "a") controls.left = false;
  if (e.key === "d") controls.right = false;
  if (e.key === " ") controls.jump = false;
});

let tx = 0, ty = 0;
let isDragging = false;

renderer.domElement.addEventListener("pointerdown", e => {
  if (e.button === 0 || e.button === 2) {
    tx = e.clientX;
    ty = e.clientY;
    isDragging = true;
  }
});

renderer.domElement.addEventListener("pointerup", () => { isDragging = false; });

renderer.domElement.addEventListener("pointermove", e => {
  if (!isDragging) return;
  let dx = e.clientX - tx;
  let dy = e.clientY - ty;
  camera.rotation.y -= dx * 0.005;
  camera.rotation.x -= dy * 0.005;
  camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
  tx = e.clientX;
  ty = e.clientY;
});

const raycaster = new THREE.Raycaster();

function handleBlockInteraction(action) {
  const direction = new THREE.Vector3();
  camera.getWorldDirection(direction);
  raycaster.set(camera.position, direction);
  const intersects = raycaster.intersectObjects(blocks);
  
  if (intersects.length > 0) {
    const block = intersects[0].object;
    const pos = block.position;
    const normal = intersects[0].face.normal.clone();
    
    if (action === "break") {
      const type = removeBlock(pos.x, pos.y, pos.z);
      if (type && type !== "leaves") inventory[type]++;
      updateInventoryUI();
    } else if (action === "place" && inventory[selectedBlock] > 0) {
      const newPos = pos.clone().add(normal);
      if (!blockMap[getBlockKey(newPos.x, newPos.y, newPos.z)]) {
        createBlock(newPos.x, newPos.y, newPos.z, TEX[selectedBlock], selectedBlock);
        inventory[selectedBlock]--;
        updateInventoryUI();
      }
    }
  }
}

const mobs = [];

function chicken(x, z) {
  const g = new THREE.Group();
  const body = new THREE.Mesh(new THREE.BoxGeometry(1, 0.8, 1), new THREE.MeshLambertMaterial({color: 0xffffff}));
  body.position.y = 1;
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshLambertMaterial({color: 0xffffff}));
  head.position.set(0, 1.6, 0.5);
  g.add(body);
  g.add(head);
  g.position.set(x, 5, z);
  g.userData.dirX = (Math.random() - 0.5) * 0.02;
  g.userData.dirZ = (Math.random() - 0.5) * 0.02;
  g.userData.changeTimer = 0;
  scene.add(g);
  mobs.push(g);
}

for(let i = 0; i < 20; i++) {
  chicken(Math.random()*80-40, Math.random()*80-40);
}

function startGame() {
  document.getElementById("menu").style.display = "none";
  document.getElementById("info").style.display = "block";
  document.getElementById("cross").style.display = "block";
  document.getElementById("hotbar").style.display = "flex";
  document.querySelectorAll(".mobile-btn").forEach(m => m.style.display = "flex");
  updateInventoryUI();
  renderer.domElement.requestPointerLock?.();
}

function groundHeight(x, z) {
  return Math.floor(Math.sin(x*0.2)*2 + Math.cos(z*0.2)*2) + 2;
}

function checkCollision(x, y, z) {
  const key = getBlockKey(x, y, z);
  return blockMap[key] !== undefined;
}

function update() {
  const speed = 0.15;
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  
  if (controls.forward) {
    let newX = camera.position.x + dir.x * speed;
    let newZ = camera.position.z + dir.z * speed;
    if (!checkCollision(newX, camera.position.y, newZ)) {
      camera.position.x = newX;
      camera.position.z = newZ;
    }
  }
  
  if (controls.back) {
    let newX = camera.position.x - dir.x * speed;
    let newZ = camera.position.z - dir.z * speed;
    if (!checkCollision(newX, camera.position.y, newZ)) {
      camera.position.x = newX;
      camera.position.z = newZ;
    }
  }
  
  if (controls.left) {
    let newX = camera.position.x + dir.z * speed;
    let newZ = camera.position.z - dir.x * speed;
    if (!checkCollision(newX, camera.position.y, newZ)) {
      camera.position.x = newX;
      camera.position.z = newZ;
    }
  }
  
  if (controls.right) {
    let newX = camera.position.x - dir.z * speed;
    let newZ = camera.position.z + dir.x * speed;
    if (!checkCollision(newX, camera.position.y, newZ)) {
      camera.position.x = newX;
      camera.position.z = newZ;
    }
  }
  
  player.vy -= 0.008;
  camera.position.y += player.vy;
  
  let g = groundHeight(Math.floor(camera.position.x), Math.floor(camera.position.z));
  
  if (camera.position.y < g) {
    camera.position.y = g;
    player.vy = 0;
    player.onGround = true;
  } else {
    player.onGround = false;
  }
  
  if (controls.jump && player.onGround) {
    player.vy = 0.15;
    player.onGround = false;
  }
  
  mobs.forEach(m => {
    m.userData.changeTimer++;
    if (m.userData.changeTimer > 30) {
      m.userData.dirX = (Math.random() - 0.5) * 0.02;
      m.userData.dirZ = (Math.random() - 0.5) * 0.02;
      m.userData.changeTimer = 0;
    }
    m.position.x += m.userData.dirX;
    m.position.z += m.userData.dirZ;
  });
}

function loop() {
  update();
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}

loop();

// Handle window resize
window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

</script>
</body>
</html>
